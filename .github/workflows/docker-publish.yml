name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "LICENSE"
      - "CONTRIBUTING.md"
  release:
    types: [published]

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: smap-grafana
            repo: smap-grafana
            context: ./quickstart
            dockerfile: ./quickstart/grafana-provisioning/Dockerfile
          - service: smap-ai-analyzer
            repo: smap-ai-analyzer
            context: ./quickstart/ai-analyzer
            dockerfile: ./quickstart/ai-analyzer/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.repo }}:latest
